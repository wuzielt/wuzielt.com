<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wuzielt</title>
    <meta name="description" content="wuzielt — live on Twitch">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,600;0,700&family=Anybody:wght@900&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --amber: #f0a030;
            --red: #e84040;
            --bg: #0b0b0e;
            --text: #d8d4cf;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.5s ease;
        }

        /* 🔴 LIVE BACKGROUND GLOW */
        body.live {
            background: radial-gradient(circle at top, rgba(232,64,64,0.25), #0b0b0e 60%);
        }

        .hero {
            padding: 3rem;
        }

        .hero-text h1 {
            font-family: 'Anybody', sans-serif;
            font-weight: 900;
            font-size: clamp(3.5rem, 8vw, 6.5rem);
            text-transform: uppercase;
        }

        /* 🔥 AMBER GLOW BASE */
        .hero-text h1 span {
            color: #ffffff;
            -webkit-text-fill-color: #ffffff;
            text-shadow:
                0 0 8px rgba(255,255,255,0.6),
                0 0 16px rgba(240,160,48,0.6),
                0 0 32px rgba(240,160,48,0.4);
        }

        /* 🔁 PULSING WHEN LIVE */
        body.live .hero-text h1 span {
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0% {
                text-shadow:
                    0 0 6px rgba(255,255,255,0.5),
                    0 0 12px rgba(240,160,48,0.5),
                    0 0 20px rgba(240,160,48,0.3);
            }
            50% {
                text-shadow:
                    0 0 12px rgba(255,255,255,0.9),
                    0 0 24px rgba(240,160,48,1),
                    0 0 48px rgba(240,160,48,0.8);
            }
            100% {
                text-shadow:
                    0 0 6px rgba(255,255,255,0.5),
                    0 0 12px rgba(240,160,48,0.5),
                    0 0 20px rgba(240,160,48,0.3);
            }
        }
    </style>
</head>
<body>

<header class="hero">
    <div class="hero-text">
        <h1><span>WUZIELT</span></h1>
    </div>
</header>

<script>
    // 🔴 SIMPLE LIVE TOGGLE
    // Change this to true when live
    const isLive = true;

    if (isLive) {
        document.body.classList.add('live');
    }
</script>

</body>
</html>
